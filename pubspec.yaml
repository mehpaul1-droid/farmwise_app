name: farmwise_app
description: سامانه هوشمند مدیریت فارم
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  fl_chart: ^1.2.0
  provider: ^6.1.5+1
  flutter_svg: ^2.3.0
  shared_preferences: ^2.5.5
  pdf: ^3.13.0
  printing: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#1B5E20"
  image: assets/icon.png
  android: true
  ios: false
  android_12:
    image: assets/icon.png
    color: "#1B5E20"
